name: Docker-Image erstellen

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Versions-Tag"
        required: true
        type: text

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag oereb_server_print:${{ inputs.tag }}
